services:
  
  postgres:
    image: postgres:16 #telecharge image officielle PostgreSQL
    container_name: postgres
    restart: always #si conteneur sarrete Docker le redémarre
    env_file:
      - .env #docker lit auto .env et transmet les POSTGRES
    
    volumes:
      - postgres_data:/var/lib/postgresql/data #conserver les données meme si le conteneur est suprimé
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql #premier demarrage PostgreSQL ececute auto init.sql
    networks:
      - app_net #tous les conteneurs sur le meme reseau
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:

    build: ./backend
  
    container_name: backend

    restart: always

    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy # Attend que la DB soit VRAIMENT prête (et pas juste lancée)
    networks:
      - app_net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s  # On lui laisse 10 secondes pour démarrer tranquillement avant de le juger

  frontend:
   
    build: ./frontend
   
    container_name: frontend
   
    restart: always
   
    networks:
      - app_net

  apache:
    image: httpd:2.4-alpine
    container_name: apache
    restart: always
    ports:
      - "80:80"
    command: >
      sh -c "
      echo 'LoadModule proxy_module modules/mod_proxy.so' >> /usr/local/apache2/conf/httpd.conf &&
      echo 'LoadModule proxy_http_module modules/mod_proxy_http.so' >> /usr/local/apache2/conf/httpd.conf &&
      echo 'ProxyPreserveHost On' >> /usr/local/apache2/conf/httpd.conf &&
      echo 'ProxyPass /api/ http://backend:8000/' >> /usr/local/apache2/conf/httpd.conf &&
      echo 'ProxyPassReverse /api/ http://backend:8000/' >> /usr/local/apache2/conf/httpd.conf &&
      echo 'ProxyPass /api http://backend:8000' >> /usr/local/apache2/conf/httpd.conf &&
      echo 'ProxyPassReverse /api http://backend:8000' >> /usr/local/apache2/conf/httpd.conf &&
      echo 'ProxyPass / http://frontend:80/' >> /usr/local/apache2/conf/httpd.conf &&
      echo 'ProxyPassReverse / http://frontend:80/' >> /usr/local/apache2/conf/httpd.conf &&
      httpd-foreground
      "
    depends_on:
      backend:
        condition: service_healthy # Apache attend que le backend réponde "healthy" avant de démarrer
      frontend:
        condition: service_started
    networks:
      - app_net

networks:
  
  app_net:
  
    driver: bridge # les conteneurs seront sur le meme reseau

volumes:
  postgres_data: