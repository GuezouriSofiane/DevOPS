<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>DevOps Application</title>
</head>

<body>

    <h1>DevOps Application</h1>

    <p>Bienvenue sur l'application.</p>

    <button onclick="checkBackend()">Vérifier le Backend</button>

    <h3 id="status">
        Status du Backend : En attente...
    </h3>

</body>

<script>

async function checkBackend() {
    const response = await fetch("/api/health");
    const data = await response.json();

    document.getElementById("status").innerText = 
        "Status du Backend : " + data.status;

}

</script>
</html>
